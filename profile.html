<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#1E5399;
    color:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header a{
    color:white;
    text-decoration:none;
    font-size:16px;
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

.profile-card{
    background:white;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    padding:40px;
}

.profile-top{
    display:flex;
    align-items:center;
    gap:30px;
    margin-bottom:40px;
}

.profile-image{
    width:140px;
    height:140px;
    border-radius:50%;
    background:#1E5399;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
}

.profile-info h1{
    color:#1E5399;
    margin-bottom:10px;
}

.profile-info p{
    color:#555;
    margin:8px 0;
    font-size:16px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    margin-bottom:40px;
}

.stat-box{
    background:#f8f9fa;
    border-radius:10px;
    padding:25px;
    text-align:center;
}

.stat-box h2{
    color:#1E5399;
    margin-bottom:10px;
    font-size:30px;
}

.info h2{
    color:#1E5399;
    margin-bottom:20px;
}

.info table{
    width:100%;
    border-collapse:collapse;
}

.info td{
    padding:15px;
    border-bottom:1px solid #ddd;
}

.info td:first-child{
    font-weight:bold;
    width:180px;
}

@media(max-width:768px){

.profile-top{
    flex-direction:column;
    text-align:center;
}

.stats{
    grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="header">

<h2><i class="fas fa-user-circle"></i> My Profile</h2>

<a href="index.html">
<i class="fas fa-arrow-left"></i> Back to Dashboard
</a>

</div>

<div class="container">

<div class="profile-card">

<div class="profile-top">

    <div class="profile-image">
        JD
    </div>

    <div class="profile-info">

        <h1>John Doe</h1>

        <p style="font-weight:600;color:#1E5399;">Administrator</p>

        <p><i class="fas fa-envelope"></i> johndoe@gmail.com</p>

        <p><i class="fas fa-phone"></i> 09678516267</p>

        <p><i class="fas fa-map-marker-alt"></i> Batangas, Philippines</p>

    </div>

</div>

<div class="stats">

<div class="stat-box">

<h2>25</h2>

<p>Saved Articles</p>

</div>

<div class="stat-box">

<h2>120</h2>

<p>Articles Viewed</p>

</div>

</div>

<div class="info">

<h2>Personal Information</h2>

<table>

<tr>
<td>Full Name</td>
<td>John Doe</td>
</tr>

<tr>
<td>Email</td>
<td>johndoe@gmail.com</td>
</tr>

<tr>
<td>Phone</td>
<td>09678516267</td>
</tr>

<tr>
<td>Address</td>
<td>Batangas, Philippines</td>
</tr>

</table>

</div>

</div>

</div>

</body>
</html>
